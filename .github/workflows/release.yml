name: Release

# 当推一个 `v*` tag 时自动跑：
#   git tag v0.1.0 && git push origin v0.1.0
# 流程：在 GitHub 的 macOS runner 上 archive + ad-hoc 签名 + 打 DMG，
# 然后创建一个 GitHub Release 并把 DMG 作为资产上传。
#
# 你不需要任何 secret —— 开源分发只用 ad-hoc 签名。

on:
  push:
    tags:
      - "v*"
  # 允许从 Actions 标签页手动触发（不会创建 Release，只产出 artifact）
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # 如果 runner 上有多版 Xcode，选最新的稳定版
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show versions (debug)
        run: |
          xcodebuild -version
          swift --version

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Regenerate placeholder app icon
        # 不 checkin 巨大的 1024 PNG，跑时生成
        run: swift scripts/make-app-icon.swift

      - name: Build + sign + DMG
        run: ./scripts/release-opensource.sh

      - name: Compute artifact name
        id: artifact
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 < "$DMG.sha256")" >> "$GITHUB_OUTPUT"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/*.dmg
            dist/*.sha256
          retention-days: 14

      - name: Create GitHub Release
        # 只在打 tag 时创建 Release；workflow_dispatch 手动触发只出 artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.sha256
          draft: false
          prerelease: false
          body: |
            ## 安装

            下载 `${{ steps.artifact.outputs.name }}`，双击挂载，把 NextStep 拖进
            Applications。首次启动前在终端跑一句：

            ```bash
            xattr -cr /Applications/NextStep.app
            ```

            然后双击启动即可。（这是因为没走 Apple 公证——开源项目免费路径。
            看完整说明：README 的"安装"章节。）

            ### 校验和

            ```
            ${{ steps.artifact.outputs.sha256 }}  ${{ steps.artifact.outputs.name }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
