name: NextStep
options:
  bundleIdPrefix: com.claw
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: NextStep/Resources/NextStep.entitlements
    INFOPLIST_FILE: NextStep/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.claw.nextstep
    PRODUCT_NAME: NextStep
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES

targets:
  NextStep:
    type: application
    platform: macOS
    sources:
      - path: NextStep
        excludes:
          - "Resources/Info.plist"
          - "Resources/NextStep.entitlements"
    resources:
      - NextStep/Resources/Assets.xcassets
    dependencies: []
    scheme:
      testTargets: []
      gatherCoverageData: false
